<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>Vix Playground</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/lint/lint.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/hint/show-hint.min.css">
    <link rel="stylesheet" href="playground.css">
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-bar-container">
            <img src="../logo.png" alt="Vix" id="loading-icon">
            <div id="loading-bar-track">
                <div id="loading-bar"></div>
            </div>
            <p id="loading-text">正在加载 Vix 编译器...</p>
        </div>
    </div>
    <div id="app">
        <header>
            <div class="header-left">
                <a href="../index.html" class="brand-link">
                    <img src="../logo.png" alt="Vix">
                    <span>Vix</span>
                </a>
                <div class="divider"></div>
                <span class="page-title">Playground</span>
            </div>
            <div class="header-right">
                <div id="status-indicator">
                    <span id="status-dot"></span>
                    <span id="status-text">等待加载编译器...</span>
                </div>
                <select id="example-selector">
                    <option value="hello">Hello World</option>
                    <option value="bubble">Bubble Sort</option>
                    <option value="struct">Struct</option>
                    <option value="binary-search">Binary Search</option>
                    <option value="fib">Fibonacci</option>
                    <option value="pointer">Pointer</option>
                    <option value="match">Pattern Match</option>
                    <option value="quicksort">QuickSort</option>
                    <option value="pointer">Pointer</option>
                </select>
                <button id="btn-run" disabled>
                    ▶ 运行
                    <span class="key-hint">Ctrl+Enter</span>
                </button>
            </div>
        </header>
        <main>
            <div id="editor-container"></div>
            <div id="output-container">
                <div id="output-tabs">
                    <button class="tab active" data-tab="output">输出</button>
                    <button class="tab" data-tab="wasm">WASM</button>
                </div>
                <div id="output-toolbar">
                    <span class="output-label">Output</span>
                    <button id="btn-clear-output">清除</button>
                </div>
                <div id="output-content"></div>
                <div id="wasm-content" style="display:none"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/mode/simple.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/rust/rust.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/lint/lint.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/hint/show-hint.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/search/match-highlighter.min.js"></script>
    <script src="vixc-wasm.js"></script>
    <script src="vix-lang.js"></script>
    <script src="vix-cm.js"></script>
    <script src="playground.js"></script>
</body>
</html>
